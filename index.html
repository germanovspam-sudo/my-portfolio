        const slides = document.querySelectorAll('.timed-slideshow .slide');
        let currentSlide = 0;
        let slideInterval;

        function showNextSlide() {
            slides[currentSlide].classList.remove('active');
            
            if (slides[currentSlide].tagName === 'VIDEO') {
                slides[currentSlide].pause();
                slides[currentSlide].currentTime = 0;
            }

            currentSlide = (currentSlide + 1) % slides.length;
            
            const nextSlide = slides[currentSlide];
            nextSlide.classList.add('active');

            if (nextSlide.tagName === 'VIDEO') {
                clearInterval(slideInterval);
                nextSlide.play().catch(err => console.log("Браузер заблокировал автоплей:", err));
                nextSlide.onended = () => {
                    showNextSlide();
                    startSlideshow();
                };
            }
        }

        function startSlideshow() {
            clearInterval(slideInterval);
            slideInterval = setInterval(showNextSlide, 2000);
        }

        startSlideshow();
    </script>
